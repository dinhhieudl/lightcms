{% extends "layouts/base.html" %}

{% block body %}
{% include "components/header.html" %}

<main class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-8">🛒 Giỏ hàng</h1>

    <div id="cart-empty" class="hidden text-center py-16">
        <p class="text-gray-500 text-lg mb-4">Giỏ hàng trống</p>
        <a href="/shop" class="text-blue-600 hover:underline">← Tiếp tục mua sắm</a>
    </div>

    <div id="cart-content" class="hidden">
        <div class="space-y-4" id="cart-items"></div>

        <div class="border-t pt-6 mt-6">
            <div class="flex justify-between items-center text-xl font-bold">
                <span>Tổng cộng:</span>
                <span class="text-red-600" id="cart-total">0₫</span>
            </div>
            <a href="/checkout"
               class="block w-full bg-blue-600 text-white text-center py-4 rounded-lg font-semibold mt-6 hover:bg-blue-700 transition">
                Tiến hành đặt hàng →
            </a>
        </div>
    </div>
</main>

{% include "components/footer.html" %}
{% endblock %}

{% block scripts %}
<script>
function renderCart() {
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const empty = document.getElementById('cart-empty');
    const content = document.getElementById('cart-content');
    const items = document.getElementById('cart-items');
    const total = document.getElementById('cart-total');

    if (cart.length === 0) {
        empty.classList.remove('hidden');
        content.classList.add('hidden');
        return;
    }

    empty.classList.add('hidden');
    content.classList.remove('hidden');
    items.innerHTML = '';

    let totalPrice = 0;
    cart.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'flex items-center gap-4 bg-white p-4 rounded-lg border';
        div.innerHTML = `
            ${item.image ? `<img src="${item.image}" class="w-20 h-20 object-cover rounded" alt="">` : ''}
            <div class="flex-1">
                <h3 class="font-medium">${item.name}</h3>
                ${item.variant_name ? `<p class="text-sm text-gray-500">${item.variant_name}</p>` : ''}
            </div>
            <div class="flex items-center border rounded">
                <button onclick="updateQty(${index}, -1)" class="px-2 py-1 hover:bg-gray-50">−</button>
                <span class="px-3 py-1">${item.quantity}</span>
                <button onclick="updateQty(${index}, 1)" class="px-2 py-1 hover:bg-gray-50">+</button>
            </div>
            <button onclick="removeItem(${index})" class="text-red-500 hover:text-red-700 text-sm">✕</button>
        `;
        items.appendChild(div);
    });

    total.textContent = totalPrice.toLocaleString('vi-VN').replace(/\./g, '.') + '₫';
}

function updateQty(index, delta) {
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    cart[index].quantity = Math.max(1, cart[index].quantity + delta);
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
    updateCartCount();
}

function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    cart.splice(index, 1);
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
    updateCartCount();
}

renderCart();
</script>
{% endblock %}
