<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập — Z-Core Admin</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center mb-6">🔐 Z-Core Admin</h1>

        {% if error %}
        <div class="bg-red-50 text-red-600 text-sm p-3 rounded-lg mb-4">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ admin_prefix }}/login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Tài khoản</label>
                <input type="text" name="username" required autofocus
                       class="w-full border rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Mật khẩu</label>
                <input type="password" name="password" required
                       class="w-full border rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-semibold hover:bg-blue-700 transition">
                Đăng nhập
            </button>
        </form>
    </div>
</body>
</html>
