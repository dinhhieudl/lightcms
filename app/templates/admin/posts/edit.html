{% extends "layouts/admin_base.html" %}

{% block admin_content %}
<h1 class="text-2xl font-bold mb-6">{% if post %}Chỉnh sửa bài viết{% else %}Viết bài mới{% endif %}</h1>

<form method="POST" enctype="multipart/form-data"
      action="{% if post %}{{ admin_prefix }}/posts/{{ post.id }}/edit{% else %}{{ admin_prefix }}/posts/new{% endif %}"
      class="grid md:grid-cols-3 gap-6">

    {# Main Content #}
    <div class="md:col-span-2 space-y-4">
        <div>
            <input type="text" name="title" value="{{ post.title if post else '' }}" required
                   placeholder="Tiêu đề bài viết"
                   class="w-full text-2xl font-bold border-0 border-b-2 border-gray-200 focus:border-blue-500 focus:outline-none py-2"
                   oninput="this.form.querySelector('[name=slug]') && (this.form.querySelector('[name=slug]').value = this.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''))">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Nội dung (Markdown)</label>
            <textarea name="content" rows="20"
                      class="w-full border rounded-lg px-4 py-3 font-mono text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">{{ post.content if post else '' }}</textarea>
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Tóm tắt</label>
            <textarea name="excerpt" rows="3"
                      class="w-full border rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none">{{ post.excerpt if post else '' }}</textarea>
        </div>
    </div>

    {# Sidebar #}
    <div class="space-y-4">
        <div class="bg-white rounded-lg border p-4">
            <label class="block text-sm font-medium mb-1">Trạng thái</label>
            <select name="status" class="w-full border rounded px-3 py-2">
                <option value="draft" {% if post and post.status.value == 'draft' %}selected{% endif %}>Nháp</option>
                <option value="published" {% if post and post.status.value == 'published' %}selected{% endif %}>Đăng</option>
                <option value="pending" {% if post and post.status.value == 'pending' %}selected{% endif %}>Chờ duyệt</option>
            </select>
        </div>

        <div class="bg-white rounded-lg border p-4">
            <label class="block text-sm font-medium mb-1">Ảnh đại diện</label>
            <input type="file" name="featured_image" accept="image/*" class="w-full text-sm">
            {% if post and post.featured_image %}
            <img src="{{ post.featured_image }}" class="mt-2 w-full rounded">
            {% endif %}
        </div>

        <div class="bg-white rounded-lg border p-4">
            <label class="block text-sm font-medium mb-1">Danh mục</label>
            <select name="category_ids" multiple class="w-full border rounded px-3 py-2 text-sm h-32">
                {% for cat in categories %}
                <option value="{{ cat.id }}"
                        {% if post and cat in post.categories %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
            <p class="text-xs text-gray-400 mt-1">Giữ Ctrl để chọn nhiều</p>
        </div>

        <div class="bg-white rounded-lg border p-4">
            <label class="block text-sm font-medium mb-1">Tags</label>
            <select name="tag_ids" multiple class="w-full border rounded px-3 py-2 text-sm h-32">
                {% for tag in tags %}
                <option value="{{ tag.id }}"
                        {% if post and tag in post.tags %}selected{% endif %}>{{ tag.name }}</option>
                {% endfor %}
            </select>
        </div>

        {# SEO #}
        <div class="bg-white rounded-lg border p-4">
            <h3 class="font-medium mb-3">🔍 SEO</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Meta Title</label>
                    <input type="text" name="meta_title" value="{{ post.meta_title if post else '' }}"
                           class="w-full border rounded px-3 py-1.5 text-sm">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Meta Description</label>
                    <textarea name="meta_description" rows="2"
                              class="w-full border rounded px-3 py-1.5 text-sm">{{ post.meta_description if post else '' }}</textarea>
                </div>
            </div>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-semibold hover:bg-blue-700">
            {% if post %}Cập nhật{% else %}Đăng bài{% endif %}
        </button>
    </div>
</form>
{% endblock %}
