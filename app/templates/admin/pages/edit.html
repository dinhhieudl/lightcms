{% extends "layouts/admin_base.html" %}

{% block admin_content %}
<h1 class="text-2xl font-bold mb-6">{% if page %}Chỉnh sửa trang{% else %}Tạo trang mới{% endif %}</h1>

<form method="POST" action="{% if page %}{{ admin_prefix }}/pages/{{ page.id }}/edit{% else %}{{ admin_prefix }}/pages/new{% endif %}"
      class="grid md:grid-cols-3 gap-6">
    <div class="md:col-span-2 space-y-4">
        <input type="text" name="title" value="{{ page.title if page else '' }}" required placeholder="Tiêu đề trang"
               class="w-full text-2xl font-bold border-0 border-b-2 border-gray-200 focus:border-blue-500 focus:outline-none py-2">
        <div>
            <label class="block text-sm font-medium mb-1">Nội dung (Markdown)</label>
            <textarea name="content" rows="20" class="w-full border rounded-lg px-4 py-3 font-mono text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">{{ page.content if page else '' }}</textarea>
        </div>
    </div>
    <div class="space-y-4">
        <div class="bg-white rounded-lg border p-4">
            <label class="block text-sm font-medium mb-1">Trạng thái</label>
            <select name="status" class="w-full border rounded px-3 py-2">
                <option value="draft" {% if page and page.status.value == 'draft' %}selected{% endif %}>Nháp</option>
                <option value="published" {% if page and page.status.value == 'published' %}selected{% endif %}>Đăng</option>
            </select>
        </div>
        <div class="bg-white rounded-lg border p-4">
            <label class="block text-sm font-medium mb-1">Template</label>
            <select name="template" class="w-full border rounded px-3 py-2">
                <option value="page" {% if page and page.template == 'page' %}selected{% endif %}>Mặc định</option>
                <option value="page_full" {% if page and page.template == 'page_full' %}selected{% endif %}>Toàn trang</option>
                <option value="page_sidebar" {% if page and page.template == 'page_sidebar' %}selected{% endif %}>Có sidebar</option>
            </select>
        </div>
        <div class="bg-white rounded-lg border p-4">
            <h3 class="font-medium mb-3">🔍 SEO</h3>
            <div class="space-y-3">
                <div><label class="block text-xs text-gray-500 mb-1">Meta Title</label><input type="text" name="meta_title" value="{{ page.meta_title if page else '' }}" class="w-full border rounded px-3 py-1.5 text-sm"></div>
                <div><label class="block text-xs text-gray-500 mb-1">Meta Description</label><textarea name="meta_description" rows="2" class="w-full border rounded px-3 py-1.5 text-sm">{{ page.meta_description if page else '' }}</textarea></div>
            </div>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-semibold hover:bg-blue-700">{% if page %}Cập nhật{% else %}Tạo trang{% endif %}</button>
    </div>
</form>
{% endblock %}
