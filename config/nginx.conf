# Z-Core Nginx Configuration (FastPanel / Reverse Proxy)
# ─────────────────────────────────────────────────────────
# Place this in: /etc/nginx/sites-available/zcore.conf
# Or add to FastPanel custom config for the domain.

upstream zcore_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Redirect HTTP → HTTPS (uncomment after SSL setup)
    # return 301 https://$server_name$request_uri;

    # ── Security Headers ─────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static Files (Nginx serves directly) ─────────────
    location /static/ {
        alias /path/to/lightcms/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;

        # WebP support with fallback
        location ~* \.(webp|avif)$ {
            expires 365d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Uploaded Media ───────────────────────────────────
    location /static/uploads/ {
        alias /path/to/lightcms/app/static/uploads/;
        expires 90d;
        add_header Cache-Control "public";

        # Serve WebP if browser supports
        if ($http_accept ~* "webp") {
            set $webp "A";
        }
        if (-f $request_filename.webp) {
            set $webp "${webp}B";
        }
        if ($webp = "AB") {
            rewrite ^(.+)\.(jpg|jpeg|png)$ $1.webp last;
        }
    }

    # ── Favicon & Robots ─────────────────────────────────
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { proxy_pass http://zcore_backend; }

    # ── Sitemap ──────────────────────────────────────────
    location = /sitemap.xml {
        proxy_pass http://zcore_backend;
    }

    # ── API & Application ────────────────────────────────
    location / {
        proxy_pass http://zcore_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 8k;
    }

    # ── Gzip ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Upload size ──────────────────────────────────────
    client_max_body_size 20M;

    # ── Logging ──────────────────────────────────────────
    access_log /var/log/nginx/zcore_access.log;
    error_log  /var/log/nginx/zcore_error.log;
}

